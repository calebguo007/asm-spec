# ASM Manifest Crawler Configuration
# Defines data sources for each service

# ─── Strategy Hierarchy ───
# 1. official_api   — structured JSON from provider's public API (best)
# 2. pricing_page   — scrape provider's pricing page HTML
# 3. docs_page      — scrape API documentation for specs
# 4. leaderboard    — fetch from public benchmarks (LMSYS, G2, etc.)
# 5. status_page    — scrape uptime from status page

defaults:
  ttl: 3600
  currency: USD
  user_agent: "ASM-Crawler/1.0 (+https://github.com/calebguo007/asm-spec)"
  request_delay_ms: 1500
  max_retries: 3
  timeout_s: 30

# ─── Leaderboard Sources (shared across services) ───
leaderboards:
  lmsys:
    url: "https://lmarena.ai/api/v1/leaderboard"
    type: official_api
    fields:
      rank: "rank"
      elo: "elo_rating"
      model: "model_name"
  
  g2:
    base_url: "https://www.g2.com/products/{slug}/reviews"
    type: pricing_page
    selectors:
      rating: "span.fw-semibold"

# ─── Service Definitions ───
services:
  # ── AI / LLM ──
  openai-gpt-4o:
    service_id: "openai/gpt-4o@2024-11-20"
    taxonomy: "ai.llm.chat"
    sources:
      pricing:
        type: official_api
        url: "https://openai.com/api/pricing/"
        # OpenAI doesn't have a JSON API for pricing, scrape the page
        fallback:
          type: pricing_page
          url: "https://openai.com/api/pricing/"
          selectors:
            input_price: "td:contains('gpt-4o') + td"
            output_price: "td:contains('gpt-4o') + td + td"
      quality:
        type: leaderboard
        ref: lmsys
        model_name: "gpt-4o-2024-11-20"
      status:
        type: status_page
        url: "https://status.openai.com"

  anthropic-claude-sonnet-4:
    service_id: "anthropic/claude-sonnet-4@4.0"
    taxonomy: "ai.llm.chat"
    sources:
      pricing:
        type: pricing_page
        url: "https://www.anthropic.com/pricing"
        selectors:
          input_price: ".pricing-table td[data-model='claude-sonnet-4']"
          output_price: ".pricing-table td[data-model='claude-sonnet-4']"
      quality:
        type: leaderboard
        ref: lmsys
        model_name: "claude-sonnet-4-20250514"
      status:
        type: status_page
        url: "https://status.anthropic.com"

  google-gemini-2-5-pro:
    service_id: "google/gemini-2.5-pro@2.5"
    taxonomy: "ai.llm.chat"
    sources:
      pricing:
        type: official_api
        url: "https://generativelanguage.googleapis.com/v1beta/models"
        # Google publishes model metadata as JSON
      quality:
        type: leaderboard
        ref: lmsys
        model_name: "gemini-2.5-pro-preview-05-06"

  # ── AI / Image ──
  bfl-flux-1-1-pro:
    service_id: "bfl/flux-1.1-pro@1.1"
    taxonomy: "ai.vision.image_generation"
    sources:
      pricing:
        type: pricing_page
        url: "https://docs.bfl.ml/pricing"

  # ── Tools ──
  todoist-api:
    service_id: "todoist/api@v2"
    taxonomy: "tool.productivity.todo"
    sources:
      pricing:
        type: pricing_page
        url: "https://todoist.com/pricing"
        selectors:
          free_tier: ".plan-free .price"
          pro_price: ".plan-pro .price"
      quality:
        type: pricing_page
        ref: g2
        slug: "todoist"

  # ... (remaining 65 services follow same pattern)
  # Full config generated by: python crawler/generate_config.py
