version: '3.8'

services:
  asm-registry:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - '3456:3456'
      - '3457:3457'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ASM_MODE=mock
    volumes:
      - ./manifests:/app/manifests
    restart: unless-stopped

  asm-crawler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: python3 /app/crawler/crawl.py --dry-run
    volumes:
      - ./manifests:/app/manifests
      - ./crawler:/app/crawler
    profiles:
      - crawler
